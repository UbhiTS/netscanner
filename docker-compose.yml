# Netryx on Docker (ideal for a NAS).
#
#   docker compose up -d --build
#   then open  http://<your-NAS-IP>:8765
#
# HOST networking is required: a bridged container is isolated on its own
# virtual network and cannot discover devices on your real LAN (no ARP, no
# ping sweep visibility, no mDNS/SNMP). network_mode: host fixes that.

name: netryx

services:
  netryx:
    build: .
    image: netryx:latest
    container_name: netryx
    network_mode: host          # REQUIRED — see your real LAN. Do not change to bridge.
    cap_add:
      - NET_RAW                 # ICMP ping only; not required (TCP discovery works without it).
                                # No privileged mode needed.
    environment:
      - NETRYX_HOST=0.0.0.0
      - NETRYX_PORT=8765    # change if 8765 is taken on the NAS
      - NETRYX_NO_BROWSER=1
      # Auth is ON by default: first launch creates admin/admin (persisted in the
      # /data volume as auth.json). Change it under Settings in the dashboard.
      # --- Optional access tweaks ---
      # - NETRYX_USER=admin                   # seed a different admin username on first launch
      # - NETRYX_PASS=change-me               # seed/override the admin password (also a recovery login)
      # - NETRYX_TRUST_LOCALHOST=0            # 0=prompt everywhere (default); 1=skip auth for 127.0.0.1
      # - NETRYX_OPEN=0                        # 1=disable auth entirely (trusted segment only)
      # - NETRYX_TOKEN=change-me              # legacy static bearer token (or create tokens in the UI)
      # --- Optional: proactive alerts ---
      # - NETRYX_WEBHOOK=https://hooks.example.com/netryx
      # - NETRYX_MQTT=192.168.1.10:1883       # broker host or host:port
      # - NETRYX_MQTT_TOPIC=netryx/events
      # - NETRYX_MQTT_USER=user
      # - NETRYX_MQTT_PASS=pass
    volumes:
      - ./netryx-data:/data # history, names/notes, vendor DB, baseline, events
    restart: unless-stopped
