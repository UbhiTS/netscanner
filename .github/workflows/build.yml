name: build

# On every push to main, auto-increment the patch version (vX.Y.Z -> vX.Y.(Z+1)),
# tag it, and publish a GitHub Release with the Windows .exe + GHCR image notes.
# Also builds on PRs (no release), and supports manual version bumps + tag pushes.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for this run"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write   # create tags + publish the Release
  packages: write   # push the Docker image to GHCR

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Compute & tag version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}
      released: ${{ steps.bump.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need full tag history
      - name: Compute next version
        id: bump
        env:
          BUMP_IN: ${{ github.event.inputs.bump }}
          MSG: ${{ github.event.head_commit.message }}
        run: |
          set -e
          git fetch --tags --force
          # A pushed tag releases that exact tag (no bump).
          case "$GITHUB_REF" in
            refs/tags/v*)
              newtag="${GITHUB_REF_NAME}"
              echo "tag=$newtag"            >> "$GITHUB_OUTPUT"
              echo "version=${newtag#v}"    >> "$GITHUB_OUTPUT"
              echo "released=true"          >> "$GITHUB_OUTPUT"
              echo "Releasing pushed tag $newtag"
              exit 0 ;;
          esac
          latest=$(git tag -l 'v*.*.*' | sort -V | tail -n1)
          [ -z "$latest" ] && latest="v0.0.0"
          echo "Latest tag: $latest"
          ver="${latest#v}"; IFS='.' read -r MA MI PA <<< "$ver"
          BUMP="${BUMP_IN:-patch}"
          case "$BUMP" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            *)     PA=$((PA+1)) ;;
          esac
          newtag="v${MA}.${MI}.${PA}"
          echo "tag=$newtag"           >> "$GITHUB_OUTPUT"
          echo "version=${MA}.${MI}.${PA}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ] || printf '%s' "$MSG" | grep -qi '\[skip release\]'; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "Not releasing (PR or [skip release]); next version would be $newtag"
            exit 0
          fi
          if git rev-parse "$newtag" >/dev/null 2>&1; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "Tag $newtag already exists — skipping."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$newtag" -m "Release $newtag"
          git push origin "$newtag"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "Created and pushed $newtag"

  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ needs.version.outputs.version }},enable=${{ needs.version.outputs.released == 'true' }}
            type=raw,value=v${{ needs.version.outputs.version }},enable=${{ needs.version.outputs.released == 'true' }}
            type=raw,value=latest,enable=${{ needs.version.outputs.released == 'true' }}
            type=ref,event=pr
            type=sha
      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"   # don't upload the .dockerbuild artifact (it broke the release download)
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  windows-exe:
    name: Standalone Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build Netryx.exe
        run: pyinstaller --onefile --name Netryx --console --add-data "ui.html;." --add-data "openapi.yaml;." --hidden-import netryx_mcp --hidden-import netryx netryx.py
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Netryx-windows-exe
          path: dist/Netryx.exe
          if-no-files-found: error

  macos-exe:
    name: macOS binary (universal2)
    # Build ONE universal2 binary on the Apple-Silicon runner — it runs natively
    # on both Intel and Apple Silicon. Avoids the scarce Intel (macos-13) runner
    # pool, which can sit unscheduled for hours.
    runs-on: macos-14
    needs: [version]
    steps:
      - uses: actions/checkout@v4
      - name: Install universal2 Python (python.org)
        run: |
          curl -fsSL -o python.pkg https://www.python.org/ftp/python/3.12.7/python-3.12.7-macos11.pkg
          sudo installer -pkg python.pkg -target /
      - name: Build universal2 binary
        run: |
          PY=/Library/Frameworks/Python.framework/Versions/3.12/bin/python3
          "$PY" -m pip install --upgrade pip pyinstaller
          "$PY" -m PyInstaller --onefile --target-arch universal2 --name netryx --console \
            --add-data "ui.html:." --add-data "openapi.yaml:." \
            --hidden-import netryx_mcp --hidden-import netryx netryx.py
      - name: Package tarball
        run: |
          cd dist
          chmod +x netryx
          lipo -info netryx || file netryx || true   # expect: x86_64 arm64
          tar -czf netryx-macos-universal.tar.gz netryx
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netryx-macos-universal
          path: dist/netryx-macos-universal.tar.gz
          if-no-files-found: error

  linux-build:
    name: Linux binary, .deb & AppImage
    runs-on: ubuntu-22.04   # older glibc baseline -> runs on most distros (Ubuntu/Debian/Arch/...)
    needs: [version]
    env:
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build one-file binary
        run: pyinstaller --onefile --name netryx --console --add-data "ui.html:." --add-data "openapi.yaml:." --hidden-import netryx_mcp --hidden-import netryx netryx.py
      - name: Portable tarball
        run: |
          cd dist
          chmod +x netryx
          tar -czf netryx-linux-x86_64.tar.gz netryx
      - name: Generate icon
        run: |
          python -m pip install --quiet pillow
          python -c "from PIL import Image,ImageDraw; img=Image.new('RGBA',(256,256),(13,17,23,255)); d=ImageDraw.Draw(img); [d.ellipse([128-r,128-r,128+r,128+r],outline=c,width=7) for r,c in [(96,(48,54,61,255)),(70,(31,111,235,255)),(44,(56,139,253,255))]]; d.ellipse([115,115,141,141],fill=(88,166,255,255)); img.save('netryx.png')"
      - name: Build .deb (fpm)
        run: |
          sudo gem install --no-document fpm
          root=debroot
          mkdir -p "$root/usr/bin" "$root/usr/share/applications" "$root/usr/share/icons/hicolor/256x256/apps"
          cp dist/netryx "$root/usr/bin/netryx"; chmod +x "$root/usr/bin/netryx"
          cp packaging/netryx.desktop "$root/usr/share/applications/netryx.desktop"
          cp netryx.png "$root/usr/share/icons/hicolor/256x256/apps/netryx.png"
          fpm -s dir -t deb -n netryx -v "$VER" \
            --description "Netryx - local network scanner & discovery dashboard" \
            --license MIT --maintainer "Netryx" --url "https://github.com/${GITHUB_REPOSITORY}" \
            --depends iputils-ping --depends iproute2 --depends net-tools \
            -C "$root" -p "netryx_${VER}_amd64.deb" usr
      - name: Build AppImage
        run: |
          appdir=AppDir
          mkdir -p "$appdir/usr/bin"
          cp dist/netryx "$appdir/usr/bin/netryx"; chmod +x "$appdir/usr/bin/netryx"
          cp packaging/netryx.desktop "$appdir/netryx.desktop"
          cp netryx.png "$appdir/netryx.png"
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/bin/netryx" "$@"\n' > "$appdir/AppRun"
          chmod +x "$appdir/AppRun"
          wget -qO appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$appdir" "Netryx-${VER}-x86_64.AppImage"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netryx-linux
          path: |
            dist/netryx-linux-x86_64.tar.gz
            netryx_*_amd64.deb
            Netryx-*-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [version, docker, windows-exe, macos-exe, linux-build]
    if: needs.version.outputs.released == 'true'
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Netryx-windows-exe
          path: dist
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: netryx-macos-universal
          path: dist
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: netryx-linux
          path: dist
      - name: Prepare release assets & notes
        shell: bash
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          IMG="ghcr.io/${GITHUB_REPOSITORY,,}"
          printf 'Netryx Docker image (GitHub Container Registry)\n\nPull:\n  docker pull %s:%s\n  docker pull %s:latest\n\nRun (NAS/server, host networking required):\n  docker run -d --name netryx --network host --cap-add NET_RAW -v "$PWD/netryx-data:/data" --restart unless-stopped %s:%s\n' "$IMG" "$VER" "$IMG" "$IMG" "$VER" > docker-image.txt
          {
            echo "### Docker image (GHCR)"
            echo ""
            echo '```'
            echo "docker pull ${IMG}:${VER}"
            echo "docker pull ${IMG}:latest"
            echo '```'
            echo ""
            echo "Run on a NAS/server (host networking required):"
            echo '```'
            echo "docker run -d --name netryx --network host --cap-add NET_RAW -v \"\$PWD/netryx-data:/data\" --restart unless-stopped ${IMG}:${VER}"
            echo '```'
            echo ""
            echo "### Windows"
            echo "Download **Netryx.exe** (unsigned — SmartScreen may warn on first run; choose *More info → Run anyway*)."
            echo ""
            echo "### macOS (universal — Intel & Apple Silicon)"
            echo "Download **netryx-macos-universal.tar.gz**, then:"
            echo '```'
            echo "tar -xzf netryx-macos-universal.tar.gz && xattr -dr com.apple.quarantine netryx && ./netryx"
            echo '```'
            echo "(Unsigned, so Gatekeeper requires clearing quarantine or right-click → Open the first time.)"
            echo ""
            echo "### Linux"
            echo "- **Netryx-${VER}-x86_64.AppImage** — \`chmod +x\` and run (works across distros)."
            echo "- **netryx_*_amd64.deb** — \`sudo apt install ./netryx_*_amd64.deb\` (Ubuntu/Debian)."
            echo "- **netryx-linux-x86_64.tar.gz** — portable binary; \`tar -xzf\` and run."
            echo ""
            echo "Data is stored per-user (\`~/.local/share/Netryx\`, \`~/Library/Application Support/Netryx\`, \`%APPDATA%\\Netryx\`). Set \`NETRYX_DATA\` to override."
          } > release_notes.md
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Netryx ${{ needs.version.outputs.tag }}
          files: |
            dist/Netryx.exe
            dist/netryx-macos-universal.tar.gz
            dist/netryx-linux-x86_64.tar.gz
            dist/netryx_*_amd64.deb
            dist/Netryx-*-x86_64.AppImage
            docker-image.txt
          body_path: release_notes.md
          append_body: true
          make_latest: "true"
